# WireGuard VPN Server Configuration — Pi 5 (argus-central)
# Location: /etc/wireguard/wg0.conf
#
# SECURITY: Never commit private keys to the repository.
# Replace <PRIVATE_KEY_REDACTED> with the actual key from /etc/wireguard/pi5-private.key

[Interface]
Address = 10.0.0.1/24
ListenPort = 51820
PrivateKey = <PRIVATE_KEY_REDACTED>
PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# Peer: argus-edge-01 (Pi 3B+)
[Peer]
PublicKey = <PI3B_PUBLIC_KEY>
AllowedIPs = 10.0.0.2/32
PersistentKeepalive = 25

# Peer: ThinkPad (red team — management access only)
[Peer]
PublicKey = <THINKPAD_PUBLIC_KEY>
AllowedIPs = 10.0.0.3/32
PersistentKeepalive = 25

# Peer: Phone (alert receiver)
[Peer]
PublicKey = <PHONE_PUBLIC_KEY>
AllowedIPs = 10.0.0.4/32
PersistentKeepalive = 25
