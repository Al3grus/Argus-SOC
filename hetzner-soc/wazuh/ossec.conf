<!-- Argus SOC — Wazuh Manager Configuration -->
<!-- Location: /var/ossec/etc/ossec.conf on Hetzner VPS -->
<!-- Sensitive values redacted — replace <PLACEHOLDER> before use -->

<ossec_config>

  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh@localhost</email_from>
    <email_to>admin@localhost</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!-- n8n Webhook Integration -->
  <!-- Fires for all alerts at level 3+ to the AI triage pipeline -->
  <integration>
    <name>custom-n8n</name>
    <hook_url>http://localhost:5678/webhook/wazuh-alert</hook_url>
    <level>3</level>
    <alert_format>json</alert_format>
  </integration>

  <!-- Log Analysis -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- Remote agent communication -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <allowed-ips>0.0.0.0/0</allowed-ips>
  </remote>

  <!-- Alert thresholds -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- Active response disabled (alerts only, no automated blocking) -->
  <active-response>
    <disabled>yes</disabled>
  </active-response>

  <!-- Vulnerability detection (optional, can be resource intensive) -->
  <vulnerability-detection>
    <enabled>no</enabled>
  </vulnerability-detection>

</ossec_config>
