# Suricata Configuration — Pi 3B+ (argus-edge-01)
# Location: /etc/suricata/suricata.yaml
# Tuned for 1GB RAM constraint on Pi 3B+

# Network interface — SPAN monitoring port only
# eth1 is the USB adapter receiving SPAN traffic from Cisco SG300 GE2
af-packet:
  - interface: eth1
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes
    use-mmap: yes
    tpacket-v3: yes

# HOME_NET — all monitored hosts
vars:
  address-groups:
    HOME_NET: "[192.168.1.0/24,10.0.0.0/24]"
    EXTERNAL_NET: "!$HOME_NET"

# Output — JSON for Wazuh Agent
outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: /var/log/suricata/eve.json
      types:
        - alert:
            payload: yes
            payload-buffer-size: 4kb
            payload-printable: yes
            packet: yes
            metadata: yes
        - http:
            extended: yes
        - dns:
            query: yes
            answer: yes
        - tls:
            extended: yes
        - files:
            force-magic: no
        - smtp:
        - ssh:
        - flow

# Memory tuning for 1GB RAM
stream:
  memcap: 32mb
  checksum-validation: yes
  inline: no
  reassembly:
    memcap: 64mb
    depth: 1mb
    toserver-chunk-size: 2560
    toclient-chunk-size: 2560
    randomize-chunk-size: yes

flow:
  memcap: 32mb
  hash-size: 65536
  prealloc: 10000
  emergency-recovery: 30

# Ruleset — ET Open (updated via suricata-update)
# Run: sudo suricata-update
default-rule-path: /var/lib/suricata/rules
rule-files:
  - suricata.rules

# Logging
logging:
  default-log-level: notice
  outputs:
    - console:
        enabled: yes
    - file:
        enabled: yes
        level: info
        filename: /var/log/suricata/suricata.log
