# Cowrie SSH Honeypot Configuration — Pi 3B+ (argus-edge-01)
# Location: /home/cowrie/cowrie/etc/cowrie.cfg
# Documentation: https://cowrie.readthedocs.io

[honeypot]

# Hostname the honeypot will present to attackers
hostname = srv01

# Directory for storing session logs and downloads
log_path = /home/cowrie/cowrie/var/log/cowrie
download_path = /home/cowrie/cowrie/var/lib/cowrie/downloads

# Fake filesystem based on a real system
filesystem = /home/cowrie/cowrie/share/cowrie/fs.pickle

# Cowrie listens on port 2222 internally (redirect 22 → 2222 via iptables)
# iptables rule:
# sudo iptables -t nat -A PREROUTING -p tcp --dport 22 -j REDIRECT --to-port 2222
listen_port = 2222

# Credentials accepted (logs all attempts regardless)
# Any credential works — attacker gets a fake shell
auth_none_enabled = false

[output_jsonlog]
enabled = true
logfile = /home/cowrie/cowrie/var/log/cowrie/cowrie.json

[output_textlog]
enabled = true
logfile = /home/cowrie/cowrie/var/log/cowrie/cowrie.log
