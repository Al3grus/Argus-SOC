<!-- Wazuh Agent Configuration — Pi 3B+ (argus-edge-01) -->
<!-- Location: /var/ossec/etc/ossec.conf -->

<ossec_config>

  <client>
    <!-- Connect directly to Hetzner over the internet — NOT via WireGuard -->
    <server>
      <address><HETZNER_IP></address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu22, ubuntu22.04</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
  </client>

  <!-- File Integrity Monitoring -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories>/etc,/usr/bin,/usr/sbin</directories>
    <directories>/bin,/sbin,/boot</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/resolv.conf</ignore>
  </syscheck>

  <!-- Log Analysis — system logs -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- Log Analysis — Suricata eve.json -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/suricata/eve.json</location>
    <label key="source">suricata</label>
  </localfile>

  <!-- Log Analysis — Zeek JSON logs -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/zeek/current/conn.log</location>
    <label key="zeek_log">conn</label>
  </localfile>

  <localfile>
    <log_format>json</log_format>
    <location>/var/log/zeek/current/dns.log</location>
    <label key="zeek_log">dns</label>
  </localfile>

  <localfile>
    <log_format>json</log_format>
    <location>/var/log/zeek/current/http.log</location>
    <label key="zeek_log">http</label>
  </localfile>

  <localfile>
    <log_format>json</log_format>
    <location>/var/log/zeek/current/notice.log</location>
    <label key="zeek_log">notice</label>
  </localfile>

  <!-- Log Analysis — Cowrie honeypot JSON logs -->
  <localfile>
    <log_format>json</log_format>
    <location>/home/cowrie/cowrie/var/log/cowrie/cowrie.json</location>
    <label key="source">cowrie</label>
  </localfile>

</ossec_config>
