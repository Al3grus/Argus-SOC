# WireGuard VPN Peer Configuration — Pi 3B+ (argus-edge-01)
# Location: /etc/wireguard/wg0.conf
#
# SECURITY: Never commit private keys to the repository.
# Replace <PRIVATE_KEY_REDACTED> with actual key.
#
# IMPORTANT: AllowedIPs must NOT include 192.168.1.0/24.
# Including the LAN subnet routes all traffic through WireGuard,
# which kills SSH connectivity when the tunnel starts.
# AllowedIPs = 10.0.0.0/24 ONLY — for management tunnel traffic.
#
# Wazuh Agent traffic goes DIRECTLY to Hetzner over the internet (port 1514),
# NOT through this WireGuard tunnel.

[Interface]
Address = 10.0.0.2/24
PrivateKey = <PRIVATE_KEY_REDACTED>

# Peer: argus-central (Pi 5 WireGuard server)
[Peer]
PublicKey = <PI5_PUBLIC_KEY>
Endpoint = 192.168.1.10:51820
AllowedIPs = 10.0.0.0/24
PersistentKeepalive = 25
